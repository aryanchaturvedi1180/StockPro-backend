spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # Routes are defined in GatewayFilterConfig.java — DO NOT duplicate here
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

service:
  auth:
    url: http://localhost:8081

cors:
  allowed-origins: http://localhost:4200